<header class="bg-surface/80 backdrop-blur-xl border-b border-primary/10 shadow-[0_0_20px_rgba(78,222,163,0.08)] fixed top-0 w-full z-50 h-16 flex items-center justify-between px-6">

  <!-- Left: Logo -->
  <div class="flex items-center">
    <a routerLink="/home" class="text-2xl font-black italic tracking-tighter text-primary uppercase">
      TRYHARD
    </a>
  </div>

  <!-- Right: User info + actions -->
  <div class="flex items-center gap-4">

    <!-- Greeting -->
    <div class="hidden sm:block text-right mr-1">
      <p class="text-[9px] uppercase tracking-[0.2em] text-outline">Bem-vindo de volta</p>
      <p class="text-sm font-bold text-primary leading-none mt-0.5">
        {{ auth.currentUser()?.nick ?? '—' }}
      </p>
    </div>

    <!-- Action icons -->
    <div class="flex items-center gap-1">
      <button class="w-9 h-9 flex items-center justify-center rounded-lg text-outline hover:text-primary hover:bg-primary/5 transition-colors">
        <span class="material-symbols-outlined text-xl">notifications</span>
      </button>
      <button class="w-9 h-9 flex items-center justify-center rounded-lg text-outline hover:text-primary hover:bg-primary/5 transition-colors">
        <span class="material-symbols-outlined text-xl">settings</span>
      </button>
    </div>

    <!-- Avatar -->
    <a routerLink="/profile" class="h-9 w-9 rounded-lg border border-outline-variant bg-surface-container-high flex items-center justify-center overflow-hidden hover:border-primary/50 transition-colors">
      @if (auth.currentUser()?.avatarUrl) {
        <img [src]="auth.currentUser()!.avatarUrl" [alt]="auth.currentUser()!.nick" class="w-full h-full object-cover" />
      } @else {
        <span class="material-symbols-outlined text-outline text-lg">person</span>
      }
    </a>

  </div>
</header>
