<!-- TODO: remover bloco de debug quando cadastro de grupos estiver implementado -->
<div class="fixed bottom-4 left-1/2 -translate-x-1/2 z-50 md:left-[calc(50%+8rem)]">
  <button
    (click)="toggleDebug()"
    class="flex items-center gap-2 px-4 py-2 bg-surface-container-high border border-outline-variant rounded-full text-[10px] uppercase tracking-widest text-outline hover:text-on-surface transition-colors shadow-lg"
  >
    <span class="material-symbols-outlined text-sm">toggle_on</span>
    DEBUG: {{ hasGroups() ? 'com grupos' : 'sem grupos' }}
  </button>
</div>

@if (hasGroups()) {
  <app-home-with />
} @else {
  <app-home-empty />
}
