<!-- Background -->
<div class="fixed inset-0 overflow-hidden pointer-events-none">
  <div class="absolute top-[-10%] right-[-10%] w-[600px] h-[600px] bg-primary/5 rounded-full blur-[120px]"></div>
  <div class="absolute bottom-[-10%] left-[-10%] w-[600px] h-[600px] bg-primary/5 rounded-full blur-[120px]"></div>
</div>

<main class="relative z-10 w-full max-w-[1920px] px-6 flex justify-center">
  <div class="w-full max-w-md flex flex-col items-center">

    <!-- Brand -->
    <div class="mb-12 text-center">
      <h1 class="text-4xl font-black tracking-tighter text-primary mb-2 italic">TRYHARD</h1>
      <p class="font-label text-[10px] uppercase tracking-[0.4em] text-outline">Performance Gaming Hub</p>
    </div>

    <!-- Card -->
    <div class="w-full bg-surface-container/40 backdrop-blur-xl p-10 rounded-lg border-[0.5px] border-outline-variant shadow-2xl">
      <header class="mb-10">
        <h2 class="text-3xl font-bold text-on-surface tracking-tight leading-none mb-3">CRIAR CONTA</h2>
        <p class="text-primary text-sm font-medium tracking-wide">Desafie seus limites</p>
      </header>

      <form (ngSubmit)="submit()" class="space-y-6">

        @if (error()) {
          <p class="text-[11px] tracking-widest text-error bg-error-container/20 px-4 py-3 rounded-lg">
            {{ error() }}
          </p>
        }

        <!-- Nick -->
        <div class="space-y-2">
          <label class="block font-label text-[10px] font-bold uppercase tracking-[0.2em] text-outline ml-1">NOME COMPLETO</label>
          <div class="relative group">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg group-focus-within:text-primary transition-colors">person</span>
            <input
              type="text"
              name="nick"
              placeholder="Insira seu nome"
              [(ngModel)]="nick"
              required
              class="w-full bg-surface-container-low border-[0.5px] border-outline-variant text-on-surface text-sm py-4 pl-12 pr-4 rounded-lg focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-outline"
            />
          </div>
        </div>

        <!-- Email -->
        <div class="space-y-2">
          <label class="block font-label text-[10px] font-bold uppercase tracking-[0.2em] text-outline ml-1">EMAIL</label>
          <div class="relative group">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg group-focus-within:text-primary transition-colors">alternate_email</span>
            <input
              type="email"
              name="email"
              placeholder="seu@email.com"
              [(ngModel)]="email"
              required
              class="w-full bg-surface-container-low border-[0.5px] border-outline-variant text-on-surface text-sm py-4 pl-12 pr-4 rounded-lg focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-outline"
            />
          </div>
        </div>

        <!-- Senha + Confirmar (grid 2 colunas) -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

          <div class="space-y-2">
            <label class="block font-label text-[10px] font-bold uppercase tracking-[0.2em] text-outline ml-1">SENHA</label>
            <div class="relative group">
              <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg group-focus-within:text-primary transition-colors">lock</span>
              <input
                type="password"
                name="password"
                placeholder="••••••••"
                [(ngModel)]="password"
                required
                class="w-full bg-surface-container-low border-[0.5px] border-outline-variant text-on-surface text-sm py-4 pl-12 pr-4 rounded-lg focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-outline"
              />
            </div>
          </div>

          <div class="space-y-2">
            <label class="block font-label text-[10px] font-bold uppercase tracking-[0.2em] text-outline ml-1">CONFIRMAR SENHA</label>
            <div class="relative group">
              <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-lg transition-colors"
                [class]="passwordMismatch ? 'text-error' : 'text-outline group-focus-within:text-primary'">
                verified_user
              </span>
              <input
                type="password"
                name="confirmPassword"
                placeholder="••••••••"
                [(ngModel)]="confirmPassword"
                required
                [class]="passwordMismatch
                  ? 'w-full bg-surface-container-low border-[0.5px] border-error text-on-surface text-sm py-4 pl-12 pr-4 rounded-lg focus:ring-1 focus:ring-error outline-none transition-all placeholder:text-outline'
                  : 'w-full bg-surface-container-low border-[0.5px] border-outline-variant text-on-surface text-sm py-4 pl-12 pr-4 rounded-lg focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-outline'"
              />
            </div>
          </div>
        </div>

        <!-- Termos -->
        <div class="flex items-center space-x-3 pt-2">
          <input
            type="checkbox"
            id="terms"
            name="acceptTerms"
            [(ngModel)]="acceptTerms"
            class="w-4 h-4 rounded-sm bg-surface-container-low border-outline-variant text-primary focus:ring-primary/20"
          />
          <label for="terms" class="text-[11px] text-outline">Aceito os termos de serviço e privacidade.</label>
        </div>

        <!-- Submit -->
        <button
          type="submit"
          [disabled]="loading()"
          class="w-full bg-primary text-on-primary py-5 rounded-lg font-label text-[11px] font-bold uppercase tracking-[0.25em] neon-glow-btn hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-4 disabled:opacity-60 disabled:cursor-not-allowed"
        >
          {{ loading() ? 'CRIANDO...' : 'CRIAR PERFIL' }}
          <span class="material-symbols-outlined text-[16px]">arrow_forward</span>
        </button>
      </form>

      <!-- Footer -->
      <footer class="mt-10 pt-8 border-t border-outline-variant text-center">
        <p class="text-[11px] text-outline uppercase tracking-wider">
          Já tem uma conta?
          <a routerLink="/auth/login" class="text-primary font-bold hover:text-primary-fixed transition-colors ml-1">LOGIN</a>
        </p>
      </footer>
    </div>

    <!-- Version -->
    <div class="mt-8 flex items-center gap-4">
      <div class="h-[1px] w-8 bg-outline/20"></div>
      <span class="font-label text-[9px] text-outline uppercase tracking-[0.3em]">TRYHARD BUILD v2.0.4 - STABLE</span>
      <div class="h-[1px] w-8 bg-outline/20"></div>
    </div>
  </div>
</main>

<!-- Overlay Texture -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>
