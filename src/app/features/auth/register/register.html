<form (ngSubmit)="submit()">
  <h1>Criar conta</h1>

  @if (error()) {
    <p class="error">{{ error() }}</p>
  }

  <input
    type="text"
    placeholder="Nick"
    [(ngModel)]="nick"
    name="nick"
    required
  />

  <input
    type="email"
    placeholder="Email"
    [(ngModel)]="email"
    name="email"
    required
  />

  <input
    type="password"
    placeholder="Senha"
    [(ngModel)]="password"
    name="password"
    required
  />

  <button type="submit" [disabled]="loading()">
    {{ loading() ? 'Criando...' : 'Criar conta' }}
  </button>

  <a routerLink="/auth/login">Já tenho conta</a>
</form>
