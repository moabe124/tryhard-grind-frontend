<div class="fixed inset-0 bg-grid-pattern pointer-events-none opacity-40"></div>

<div class="fixed inset-0 flex items-center justify-center p-6">
  <div class="w-full max-w-[450px] relative">

    <!-- Ambient glows -->
    <div class="absolute -top-12 -left-12 w-64 h-64 bg-primary/10 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="absolute -bottom-12 -right-12 w-64 h-64 bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>

    <!-- Card -->
    <div class="relative bg-surface/80 backdrop-blur-2xl border-[0.5px] border-primary-container/20 p-10 lg:rounded-lg neon-glow-primary overflow-hidden">

      <!-- Top border glow -->
      <div class="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-transparent via-primary to-transparent opacity-50"></div>

      <!-- Header -->
      <div class="flex flex-col items-center mb-10">
        <div class="flex items-center gap-2 mb-2">
          <span class="material-symbols-outlined text-primary text-3xl">security</span>
          <h1 class="font-headline font-black text-3xl tracking-tighter text-primary">RANKARENA</h1>
        </div>
        <p class="text-[10px] tracking-[0.2em] font-bold text-slate-500 uppercase">AUTHENTICATION_REQUIRED</p>
      </div>

      <!-- Form -->
      <form (ngSubmit)="submit()" class="space-y-6">

        @if (error()) {
          <p class="text-[11px] tracking-widest text-error bg-error-container/20 px-4 py-3 rounded-lg">
            {{ error() }}
          </p>
        }

        <!-- Email -->
        <div class="space-y-2">
          <label class="text-[9px] tracking-[0.2em] font-bold text-primary uppercase ml-1">OPERATIVE_ID</label>
          <div class="relative group">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors text-lg">alternate_email</span>
            <input
              type="email"
              name="email"
              placeholder="EMAIL OR USERNAME"
              [(ngModel)]="email"
              required
              class="w-full bg-surface-container-lowest border-[0.5px] border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary/20 text-on-surface text-sm pl-12 pr-4 py-4 rounded-lg transition-all outline-none placeholder:text-slate-600"
            />
          </div>
        </div>

        <!-- Password -->
        <div class="space-y-2">
          <div class="flex justify-between items-center px-1">
            <label class="text-[9px] tracking-[0.2em] font-bold text-primary uppercase">ACCESS_KEY</label>
            <a href="#" class="text-[9px] tracking-[0.1em] font-bold text-slate-500 hover:text-primary transition-colors uppercase">FORGOT_KEY?</a>
          </div>
          <div class="relative group">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors text-lg">lock</span>
            <input
              type="password"
              name="password"
              placeholder="••••••••••••"
              [(ngModel)]="password"
              required
              class="w-full bg-surface-container-lowest border-[0.5px] border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary/20 text-on-surface text-sm pl-12 pr-4 py-4 rounded-lg transition-all outline-none placeholder:text-slate-600"
            />
          </div>
        </div>

        <!-- Remember me -->
        <div class="flex items-center gap-3 px-1">
          <label class="relative flex items-center cursor-pointer">
            <input type="checkbox" name="rememberMe" [(ngModel)]="rememberMe" class="peer sr-only" />
            <div class="w-4 h-4 border border-outline-variant rounded bg-surface-container-lowest peer-checked:bg-primary peer-checked:border-primary transition-all"></div>
            <span class="material-symbols-outlined absolute text-[12px] text-on-primary opacity-0 peer-checked:opacity-100 left-[2px]" style="font-variation-settings: 'FILL' 1">check</span>
          </label>
          <span class="text-[10px] tracking-widest font-medium text-slate-400 uppercase">REMEMBER_OPERATIVE</span>
        </div>

        <!-- Submit -->
        <button
          type="submit"
          [disabled]="loading()"
          class="w-full group relative overflow-hidden bg-primary text-on-primary font-black py-5 rounded-lg text-[11px] tracking-[0.25em] transition-all hover:scale-[1.02] active:scale-95 neon-glow-btn uppercase disabled:opacity-60 disabled:cursor-not-allowed disabled:hover:scale-100"
        >
          {{ loading() ? 'AUTHENTICATING...' : 'SIGN IN' }}
          <div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
        </button>
      </form>

      <!-- Register link -->
      <div class="mt-12 pt-8 border-t-[0.5px] border-outline-variant text-center">
        <p class="text-xs text-slate-500 font-light mb-2">NEW TO THE ARENA?</p>
        <a routerLink="/auth/register" class="inline-flex items-center gap-2 group">
          <span class="text-[10px] tracking-[0.2em] font-bold text-primary uppercase transition-all group-hover:tracking-[0.3em]">CREATE_TACTICAL_PROFILE</span>
          <span class="material-symbols-outlined text-primary text-sm transition-transform group-hover:translate-x-1">arrow_forward</span>
        </a>
      </div>
    </div>

    <!-- Status bar -->
    <div class="mt-8 flex justify-center gap-8">
      <div class="flex flex-col items-center">
        <span class="text-[9px] tracking-widest text-slate-600 font-bold uppercase">SYSTEM_STATUS</span>
        <div class="flex items-center gap-1.5 mt-1">
          <div class="w-1.5 h-1.5 rounded-full bg-primary animate-pulse"></div>
          <span class="text-[9px] font-bold text-primary">OPERATIONAL</span>
        </div>
      </div>
      <div class="flex flex-col items-center">
        <span class="text-[9px] tracking-widest text-slate-600 font-bold uppercase">SECURE_CHANNEL</span>
        <div class="flex items-center gap-1.5 mt-1">
          <span class="material-symbols-outlined text-[10px] text-slate-400">encrypted</span>
          <span class="text-[9px] font-bold text-slate-400">AES_256</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Corner decorations -->
<div class="fixed top-0 left-0 w-32 h-32 opacity-10 pointer-events-none">
  <svg class="w-full h-full text-primary" viewBox="0 0 100 100">
    <path d="M0 0 L100 0 L100 10 L10 10 L10 100 L0 100 Z" fill="currentColor"></path>
  </svg>
</div>
<div class="fixed bottom-0 right-0 w-32 h-32 opacity-10 pointer-events-none rotate-180">
  <svg class="w-full h-full text-primary" viewBox="0 0 100 100">
    <path d="M0 0 L100 0 L100 10 L10 10 L10 100 L0 100 Z" fill="currentColor"></path>
  </svg>
</div>
